<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carsteen — Explorations</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

    :root {
      --bg: #faf8f5;
      --surface: #fff;
      --text: #2c2c2c;
      --muted: #777;
      --line: #e0dcd6;
      --accent: #8e44ad;
      --accent-bg: #f4ecf7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      max-width: 640px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .hero .subtitle {
      color: var(--muted);
      font-size: 1.05rem;
      font-style: italic;
      margin-bottom: 3rem;
    }

    .projects {
      display: grid;
      gap: 1rem;
      width: 100%;
    }

    .project-card {
      display: block;
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      text-decoration: none;
      color: var(--text);
      text-align: left;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .project-card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }

    .project-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .project-card .tag {
      display: inline-block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      background: var(--accent-bg);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      margin-bottom: 0.6rem;
    }

    .project-card p {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    footer {
      margin-top: 4rem;
      color: var(--muted);
      font-size: 0.8rem;
    }

    @media (max-width: 700px) {
      .hero h1 { font-size: 1.8rem; }
      body { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Explorations</h1>
    <p class="subtitle">Carnets de recherche et visualisations</p>

    <div class="projects">
      <a href="linguistique-culture.html" class="project-card">
        <span class="tag">en cours</span>
        <h2>Linguistique & Culture</h2>
        <p>Comment les langues façonnent notre perception du monde — relativisme linguistique, concepts intraduisibles, et cartographie des transferts lexicaux.</p>
      </a>
    </div>
  </div>

  <footer>carsteen — 2026</footer>
</body>
</html>
